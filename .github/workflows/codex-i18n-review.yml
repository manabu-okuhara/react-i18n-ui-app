name: Codex I18n Review

on:
  create:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex_review:
    if: github.event_name == 'pull_request' || github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.collect_message.outputs.final_message }}
      codex_succeeded: ${{ steps.codex_status.outputs.codex_succeeded }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
          fetch-depth: 0

      - name: Run Codex i18n review
        id: run_codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/i18n-review.md
          output-file: codex-i18n-review.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Record Codex status
        id: codex_status
        run: |
          if [ -f codex-i18n-review.md ]; then
            echo "codex_succeeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "codex_succeeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write fallback report when Codex fails
        if: steps.codex_status.outputs.codex_succeeded != 'true'
        run: |
          cat > codex-i18n-review.md <<'EOF'
          # Codex I18n Review

          Codex review could not be completed automatically.

          Possible causes:
          - OpenAI API quota exceeded
          - billing not enabled for the API project
          - invalid or expired OPENAI_API_KEY
          - temporary OpenAI service issue

          Next steps:
          1. Check OpenAI API billing and usage.
          2. Verify the GitHub Actions secret OPENAI_API_KEY.
          3. Re-run this workflow after fixing the API access issue.
          EOF

      - name: Collect review message
        id: collect_message
        run: |
          {
            echo "final_message<<EOF"
            cat codex-i18n-review.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Codex review artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-i18n-review-${{ github.run_id }}
          path: codex-i18n-review.md

      - name: Append workflow summary
        run: |
          {
            echo '## Codex I18n Review'
            echo
            cat codex-i18n-review.md
          } >> "$GITHUB_STEP_SUMMARY"

  post_pr_comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: codex_review
    permissions:
      pull-requests: write
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

