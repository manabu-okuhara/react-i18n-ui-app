name: Lokalise Duplicate Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  duplicate_check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Lokalise duplicate check
        run: node scripts/check-lokalise-duplicates.mjs
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}

      - name: Upload duplicate check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lokalise-duplicate-report
          path: lokalise-duplicate-report.md

      - name: Add workflow summary
        if: always()
        run: |
          {
            echo '## Lokalise Duplicate Check'
            echo
            cat lokalise-duplicate-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('lokalise-duplicate-report.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

